<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="theme-color" content="#00703c">
<title>7-Eleven · ลงเวลาเข้างาน</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Anuphan:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@vladmandic/face-api/dist/face-api.js"></script>
<style>
  :root{
    --green:#00703c; --green-d:#00582f; --green-soft:#e7f3ec;
    --orange:#f5821f; --orange-soft:#fdeede;
    --red:#e11f26; --red-soft:#fdeaea;
    --bg:#eceee9; --card:#ffffff; --line:#e3e6e1; --line2:#cfd3cc;
    --txt:#1b1f1c; --muted:#737a73; --mono:'IBM Plex Mono',monospace;
  }
  *{box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent;}
  body{font-family:'Anuphan',sans-serif; background:var(--bg); color:var(--txt);
       min-height:100dvh; display:flex; justify-content:center;}
  .app{width:100%; max-width:460px; background:var(--card); min-height:100dvh; display:flex; flex-direction:column;
       box-shadow:0 0 40px rgba(0,0,0,.06);}
  .stripe{height:6px; display:flex;}
  .stripe i{flex:1; display:block;}
  .stripe .g{background:var(--green);} .stripe .o{background:var(--orange);} .stripe .r{background:var(--red);}
  .inner{padding:16px 16px 40px; display:flex; flex-direction:column; gap:14px;}

  header{display:flex; align-items:center; gap:12px;}
  .emblem{width:52px; height:52px; border-radius:13px; overflow:hidden; flex:none;
          box-shadow:0 2px 0 rgba(0,0,0,.07);}
  .emblem img{width:100%; height:100%; object-fit:cover; display:block;}
  .htext{flex:1; line-height:1.2;}
  .htext .t1{font-size:12.5px; color:var(--green); font-weight:700; letter-spacing:1.2px;}
  .htext .t2{font-size:17px; font-weight:600; margin-top:2px;}
  #clock{font-family:var(--mono); font-size:14px; color:var(--muted); font-variant-numeric:tabular-nums;}

  .cam{position:relative; aspect-ratio:1/1; border-radius:18px; overflow:hidden; background:#0c0f0d;
       border:1px solid var(--line);}
  video{width:100%; height:100%; object-fit:cover; transform:scaleX(-1);}
  .ring{position:absolute; inset:0; border:3px solid transparent; border-radius:18px;
        transition:border-color .25s; pointer-events:none;}
  .ring.on{border-color:var(--green);}
  .facebadge{position:absolute; left:11px; bottom:11px; font-size:13px; padding:6px 12px;
        border-radius:999px; background:rgba(0,0,0,.55); backdrop-filter:blur(6px); color:#fff;
        display:flex; align-items:center; gap:8px;}
  .dot{width:8px; height:8px; border-radius:50%; background:#9aa19a;}
  .dot.on{background:#34d27e; box-shadow:0 0 0 4px rgba(52,210,126,.22);}
  .camnote{position:absolute; inset:0; display:flex; align-items:center; justify-content:center;
        text-align:center; padding:24px; color:#cfd3cc; font-size:14px;}

  .field label{display:block; font-size:12.5px; color:var(--muted); margin:0 0 7px 2px; letter-spacing:.3px; font-weight:500;}
  input[type=text]{width:100%; background:#fff; border:1.5px solid var(--line2); border-radius:13px;
        padding:15px 15px; font:inherit; font-size:18px; color:var(--txt); letter-spacing:1px;
        text-transform:uppercase;}
  input[type=text]::placeholder{letter-spacing:.5px; text-transform:none; color:#aab0a9;}
  input[type=text]:focus{outline:none; border-color:var(--green); box-shadow:0 0 0 3px var(--green-soft);}
  .hint{font-size:13.5px; margin:8px 2px 0; min-height:18px; display:flex; align-items:center; gap:6px;}
  .hint.ok{color:var(--green); font-weight:500;} .hint.bad{color:var(--red);} .hint.idle{color:var(--muted);}

  .status{background:#fafbf9; border:1px solid var(--line); border-radius:16px; overflow:hidden;}
  .srow{display:flex; align-items:center; justify-content:space-between; padding:13px 16px;}
  .srow+.srow{border-top:1px solid var(--line);}
  .slabel{font-size:14px; color:var(--muted);}
  .sval{font-family:var(--mono); font-size:14px; font-variant-numeric:tabular-nums; color:var(--txt);}
  .pill{font-family:'Anuphan'; font-size:12.5px; padding:5px 12px; border-radius:999px; font-weight:600;}
  .pill.ok{background:var(--green-soft); color:var(--green-d);}
  .pill.bad{background:var(--red-soft); color:var(--red);}
  .pill.idle{background:#eef0ec; color:var(--muted);}

  .btns{display:grid; grid-template-columns:1fr 1fr; gap:10px;}
  button.act{border:1.5px solid transparent; border-radius:15px; padding:17px 0; font:inherit;
        font-size:17px; font-weight:600; cursor:pointer; transition:transform .08s, opacity .2s;}
  button.act:active{transform:scale(.98);}
  button.in{background:var(--green); color:#fff;}
  button.out{background:#fff; color:var(--green-d); border-color:var(--line2);}
  button.act:disabled{opacity:.4; cursor:not-allowed;}
  .lockmsg{font-size:13px; color:var(--orange); text-align:center; min-height:18px; margin-top:-2px; font-weight:500;}

  .toast{border-radius:14px; padding:15px 16px; font-size:15px; line-height:1.55; display:none; white-space:pre-line;}
  .toast.show{display:block;}
  .toast.ok{background:var(--green-soft); color:var(--green-d); border:1px solid #b9dcc7;}
  .toast.err{background:var(--red-soft); color:#a3151b; border:1px solid #f1bcbe;}

  .foot{text-align:center; margin-top:4px;}
  .link{color:var(--muted); font-size:13px; text-decoration:underline; cursor:pointer; background:none; border:0; font-family:inherit;}

  .overlay{position:fixed; inset:0; background:rgba(20,24,21,.55); backdrop-filter:blur(3px);
        display:none; align-items:center; justify-content:center; padding:20px; z-index:9;}
  .overlay.show{display:flex;}
  .sheet{background:#fff; border-radius:20px; padding:22px; width:100%; max-width:380px;
        display:flex; flex-direction:column; gap:14px; border-top:6px solid var(--green);}
  .sheet h2{font-size:18px; font-weight:600;}
  .sheet p{font-size:13.5px; color:var(--muted); line-height:1.55;}
  .spin{width:15px; height:15px; border:2px solid rgba(255,255,255,.4); border-top-color:#fff;
        border-radius:50%; display:inline-block; animation:sp .7s linear infinite; vertical-align:-2px;}
  button.out .spin, .sheet .spin{border-color:rgba(0,112,60,.3); border-top-color:var(--green);}
  @keyframes sp{to{transform:rotate(360deg)}}
</style>
</head>

<script>
// ====== ตั้งค่า ======
const SCRIPT_URL = 'PASTE_YOUR_APPS_SCRIPT_EXEC_URL_HERE';   // เช่น https://script.google.com/macros/s/AKfy.../exec
const MODEL_URL  = 'https://cdn.jsdelivr.net/npm/@vladmandic/face-api/model';
// ถ้าโมเดลโหลดไม่ขึ้น ลองเปลี่ยนเป็น:
// 'https://cdn.jsdelivr.net/gh/justadudewhohacks/face-api.js@master/weights'

let CFG = { branches:[], shifts:[], employees:[], threshold:0.5 };
let gps = { lat:null, lng:null, accuracy:null, branch:null, distance:null, within:false };
let empMatch = null;            // พนักงานที่ตรงกับรหัสที่กรอกในหน้าหลัก
let modelsReady = false, faceDetected = false, busy = false;

const $ = id => document.getElementById(id);

// ====== นาฬิกา ======
setInterval(() => { $('clock').textContent = new Date().toLocaleTimeString('th-TH',{hour12:false}); }, 1000);

// ====== เริ่มต้น ======
init();
async function init(){
  await loadConfig();
  await startCamera();
  await loadModels();
  startGeo();
  detectLoop();
}

async function loadConfig(){
  try{
    const r = await fetch(SCRIPT_URL + '?action=config');
    CFG = await r.json();
  }catch(e){ showToast('err','โหลดข้อมูลระบบไม่สำเร็จ ตรวจ SCRIPT_URL'); }
}

// ค้นหาพนักงานจากรหัส (ไม่สนตัวพิมพ์เล็กใหญ่) ส่งกลับ object หรือ null
function lookupEmp(v){
  v = (v||'').trim();
  if(!v) return null;
  const list = CFG.employees || [];
  if(!list.length) return { emp_id:v, name:null, unknown:true };   // เผื่อโหลด config ไม่ได้
  return list.find(e => String(e.emp_id).toUpperCase() === v.toUpperCase()) || null;
}

function renderHint(hintEl, match, raw){
  if(!raw){ hintEl.className='hint idle'; hintEl.textContent=''; return; }
  if(!match){ hintEl.className='hint bad'; hintEl.textContent='ไม่พบรหัสนี้'; return; }
  if(match.unknown){ hintEl.className='hint idle'; hintEl.textContent='ส่งด้วยรหัส '+match.emp_id; return; }
  hintEl.className='hint ok'; hintEl.textContent='✓ '+match.name;
}

async function startCamera(){
  try{
    const s = await navigator.mediaDevices.getUserMedia({ video:{ facingMode:'user', width:480, height:480 }, audio:false });
    $('video').srcObject = s;
    $('camnote').style.display = 'none';
  }catch(e){
    $('camnote').textContent = 'เปิดกล้องไม่ได้ — ต้องเปิดผ่าน https และอนุญาตสิทธิ์กล้อง';
    $('facetext').textContent = 'ไม่มีกล้อง';
  }
}

async function loadModels(){
  $('facetext').textContent = 'กำลังโหลดโมเดล…';
  try{
    await faceapi.nets.tinyFaceDetector.loadFromUri(MODEL_URL);
    await faceapi.nets.faceLandmark68Net.loadFromUri(MODEL_URL);
    await faceapi.nets.faceRecognitionNet.loadFromUri(MODEL_URL);
    modelsReady = true;
    $('facetext').textContent = 'ค้นหาใบหน้า…';
  }catch(e){
    $('facetext').textContent = 'โหลดโมเดลไม่สำเร็จ';
    showToast('err','โหลดโมเดลใบหน้าไม่สำเร็จ ลองสลับ MODEL_URL อีกตัวในโค้ด');
  }
}

function startGeo(){
  if(!navigator.geolocation){ $('zonePill').textContent='ไม่รองรับ GPS'; return; }
  navigator.geolocation.watchPosition(pos=>{
    gps.lat=pos.coords.latitude; gps.lng=pos.coords.longitude; gps.accuracy=pos.coords.accuracy;
    evaluateZone(); updateUI();
  }, ()=>{ $('zonePill').className='pill bad'; $('zonePill').textContent='ปฏิเสธ GPS'; },
  { enableHighAccuracy:true, maximumAge:3000, timeout:15000 });
}

function evaluateZone(){
  let best=null, bestD=Infinity;
  (CFG.branches||[]).forEach(b=>{
    const d=haversine(gps.lat,gps.lng,b.lat,b.lng);
    if(d<bestD){ bestD=d; best=b; }
  });
  gps.branch=best; gps.distance=best?bestD:null;
  if(best){ const bonus=Math.min(gps.accuracy||0,50); gps.within=bestD<=best.radius_m+bonus; }
  else gps.within=false;
}

function haversine(lat1,lng1,lat2,lng2){
  const R=6371000, toRad=x=>x*Math.PI/180;
  const dLat=toRad(lat2-lat1), dLng=toRad(lng2-lng1);
  const a=Math.sin(dLat/2)**2 + Math.cos(toRad(lat1))*Math.cos(toRad(lat2))*Math.sin(dLng/2)**2;
  return 2*R*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}

async function detectLoop(){
  if(modelsReady){
    try{
      const det = await faceapi.detectSingleFace($('video'), new faceapi.TinyFaceDetectorOptions());
      faceDetected = !!det;
    }catch(e){ faceDetected=false; }
  }
  updateUI();
  setTimeout(detectLoop, 700);
}

function updateUI(){
  $('ring').className = 'ring ' + (faceDetected?'on':'');
  $('facedot').className = 'dot ' + (faceDetected?'on':'');
  if(modelsReady) $('facetext').textContent = faceDetected ? 'พบใบหน้า' : 'ไม่พบใบหน้า';

  $('branchName').textContent = gps.branch ? gps.branch.name : '—';
  $('distVal').textContent = gps.distance!=null ? Math.round(gps.distance)+' ม.' : '— ม.';
  $('accVal').textContent  = gps.accuracy!=null ? '± '+Math.round(gps.accuracy)+' ม.' : '± — ม.';
  const zp=$('zonePill');
  if(gps.distance==null){ zp.className='pill idle'; zp.textContent='รอสัญญาณ'; }
  else if(gps.within){ zp.className='pill ok'; zp.textContent='อยู่ในพื้นที่'; }
  else { zp.className='pill bad'; zp.textContent='นอกพื้นที่'; }

  const reasons=[];
  if(!empMatch) reasons.push('กรอกรหัสพนักงานให้ถูกต้อง');
  if(!modelsReady) reasons.push('รอโหลดโมเดล');
  if(!faceDetected) reasons.push('ให้กล้องเห็นใบหน้า');
  if(!gps.within) reasons.push('เข้าใกล้พื้นที่ทำงาน');
  const ready = reasons.length===0 && !busy;
  $('btnIn').disabled=!ready; $('btnOut').disabled=!ready;
  $('lockMsg').textContent = busy ? '' : (reasons.length ? 'ต้อง: '+reasons.join(' · ') : '');
}

// ====== จับภาพ + ส่ง ======
async function getDescriptor(){
  const det = await faceapi.detectSingleFace($('video'), new faceapi.TinyFaceDetectorOptions())
    .withFaceLandmarks().withFaceDescriptor();
  return det ? Array.from(det.descriptor) : null;
}
function capturePhoto(){
  const v=$('video'), c=document.createElement('canvas');
  const w=320, h=Math.round(v.videoHeight/v.videoWidth*w)||320;
  c.width=w; c.height=h; c.getContext('2d').drawImage(v,0,0,w,h);
  return c.toDataURL('image/jpeg',0.7);
}
async function post(payload){
  const r = await fetch(SCRIPT_URL,{ method:'POST', headers:{'Content-Type':'text/plain;charset=utf-8'}, body:JSON.stringify(payload) });
  return r.json();
}

async function submit(action){
  if(busy || !empMatch) return;
  busy=true; updateUI(); $('lockMsg').textContent='';
  setBtnBusy(true);
  try{
    const descriptor = await getDescriptor();
    if(!descriptor){ showToast('err','ไม่พบใบหน้าชัดเจน ลองใหม่'); return; }
    const data = await post({
      action, emp_id:empMatch.emp_id, descriptor,
      lat:gps.lat, lng:gps.lng, accuracy:gps.accuracy,
      photo: action==='checkin' ? capturePhoto() : ''
    });
    if(data.ok){
      let m;
      if(action==='checkin'){
        m='✅ บันทึกเข้างานแล้ว\n'+data.emp_name+' · กะ'+data.shift+'\n'+data.branch+' · '+data.time;
        if(data.late_min>0) m+='\n⚠️ สาย '+data.late_min+' นาที';
      } else {
        m='👋 บันทึกออกงานแล้ว\n'+data.emp_name+' · '+data.time;
        if(data.ot_hours>0) m+='\nOT '+data.ot_hours+' ชม.';
      }
      showToast('ok', m);
    } else showToast('err', data.error||'เกิดข้อผิดพลาด');
  }catch(e){ showToast('err','ส่งข้อมูลไม่สำเร็จ ตรวจการเชื่อมต่อ'); }
  finally{ busy=false; setBtnBusy(false); updateUI(); }
}
function setBtnBusy(on){
  $('btnIn').innerHTML  = on?'<span class="spin"></span>':'เข้างาน';
  $('btnOut').innerHTML = on?'<span class="spin"></span>':'ออกงาน';
}
function showToast(kind,msg){
  const t=$('toast'); t.className='toast show '+kind; t.textContent=msg;
  if(kind==='ok') setTimeout(()=>t.classList.remove('show'), 8000);
}

// ====== events ======
$('empId').addEventListener('input', e=>{
  empMatch = lookupEmp(e.target.value);
  renderHint($('empHint'), empMatch, e.target.value.trim());
  updateUI();
});
$('btnIn').onclick  = ()=>submit('checkin');
$('btnOut').onclick = ()=>submit('checkout');

// ====== ลงทะเบียนใบหน้า ======
let regMatch = null;
$('regBtn').onclick   = ()=>$('regOverlay').classList.add('show');
$('regClose').onclick = ()=>$('regOverlay').classList.remove('show');
$('regId').addEventListener('input', e=>{
  regMatch = lookupEmp(e.target.value);
  renderHint($('regHint'), regMatch, e.target.value.trim());
});
$('regSave').onclick = async ()=>{
  if(!regMatch){ showToast('err','กรอกรหัสพนักงานให้ถูกต้องก่อน'); return; }
  if(!modelsReady){ showToast('err','รอโหลดโมเดลก่อน'); return; }
  $('regSave').innerHTML='<span class="spin"></span>';
  try{
    const descriptor = await getDescriptor();
    if(!descriptor){ showToast('err','ไม่พบใบหน้าชัดเจน ลองใหม่'); return; }
    const data = await post({ action:'register', emp_id:regMatch.emp_id, descriptor });
    if(data.ok){ showToast('ok','ลงทะเบียนใบหน้า '+data.emp_name+' สำเร็จ'); $('regOverlay').classList.remove('show'); }
    else showToast('err', data.error||'ลงทะเบียนไม่สำเร็จ');
  }catch(e){ showToast('err','ส่งข้อมูลไม่สำเร็จ'); }
  finally{ $('regSave').textContent='บันทึกใบหน้า'; }
};
</script>
